name: Publish Tag

# On a release tag, publish the binary to the GitHub Release and push a
# multi-arch container manifest. A multi-arch image build needs QEMU and a
# manifest-capable builder, set up below.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # upload the release binary
  packages: write # push the container manifest

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      # `make publish` builds and pushes with podman (podman-specific
      # `build --manifest` and `manifest push --all … docker://…`, which docker
      # does not implement), so authenticate podman directly. Logging in with
      # docker instead only works because podman falls back to reading
      # ~/.docker/config.json — this makes the auth explicit and deterministic.
      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish binary + multi-arch container
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make publish
