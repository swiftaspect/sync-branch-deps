name: Publish Tag

# On a release tag, publish the binary to the GitHub Release and push a
# multi-arch container manifest. A multi-arch image build needs QEMU and a
# manifest-capable builder, set up below.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # upload the release binary
  packages: write # push the container manifest

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish binary + multi-arch container
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make publish
