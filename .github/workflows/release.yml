name: Cut Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    # release-please: maintains a release PR; on merge it tags + creates the
    # GitHub Release (which triggers publish-tag.yml).
    uses: swiftaspect/gha-workflows/.github/workflows/release.yml@v1.5.0
    with:
      release-type: rust
    secrets: inherit
